<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps Project</title>
</head>
<body style="font-family: Arial, sans-serif; text-align: center; margin-top: 30px; background-color: #f4f4f9;">
    <h1>NTI DevOps Final Project</h1>
    
    <!-- Database Connection Status -->
    <div style="margin: 10px auto; padding: 15px; max-width: 400px; background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
        <h3>Database Status:</h3>
        <p id="db-message" style="font-size: 16px; color: #2e7d32; font-weight: bold;">Connecting to backend...</p>
    </div>

    <!-- Write Message to DB -->
    <div style="margin: 20px auto; padding: 20px; max-width: 400px; background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
        <h3>Write to Database:</h3>
        <input type="text" id="msg-input" placeholder="Type a message to save..." style="width: 80%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px;">
        <br>
        <button onclick="saveMessage()" style="padding: 10px 20px; background: #1976d2; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;">Save to DB</button>
        <p id="save-status" style="font-size: 14px; margin-top: 10px; font-weight: bold;"></p>
    </div>

    <!-- Read Messages from DB -->
    <div style="margin: 20px auto; padding: 20px; max-width: 400px; background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
        <h3>Retrieve from Database:</h3>
        <button onclick="getMessages()" style="padding: 10px 20px; background: #2e7d32; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;">Get Messages</button>
        <ul id="msg-list" style="text-align: left; margin-top: 15px; padding-left: 20px; max-height: 150px; overflow-y: auto; list-style-type: square;"></ul>
    </div>

    <script>
        // On EKS, this connects via relative path or local service. We use standard port 5000.
        const API_URL = '/api';


        // Check Connection Status
        fetch(`${API_URL}/status`)
            .then(response => response.json())
            .then(data => {
                document.getElementById('db-message').innerText = data.message;
            })
            .catch(err => {
                document.getElementById('db-message').innerText = "Failed to connect to Backend API!";
                document.getElementById('db-message').style.color = "#c62828";
            });

        // Save Message (POST)
        function saveMessage() {
            const text = document.getElementById('msg-input').value;
            const statusText = document.getElementById('save-status');
            if (!text) return;

            statusText.innerText = "Saving...";
            statusText.style.color = "#555";

            fetch(`${API_URL}/message`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: text })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    statusText.innerText = "Saved successfully! ✅";
                    statusText.style.color = "#2e7d32";
                    document.getElementById('msg-input').value = ""; // Clear input
                } else {
                    statusText.innerText = "Failed to save! ❌";
                    statusText.style.color = "#c62828";
                }
            })
            .catch(err => {
                statusText.innerText = "Error connecting to server! ❌";
                statusText.style.color = "#c62828";
                console.error(err);
            });
        }

        // Get Messages (GET)
        function getMessages() {
            const listContainer = document.getElementById('msg-list');
            listContainer.innerHTML = "<li>Loading...</li>";

            fetch(`${API_URL}/messages`)
            .then(response => response.json())
            .then(data => {
                listContainer.innerHTML = "";
                if (data.length === 0) {
                    listContainer.innerHTML = "<li>No messages in database yet!</li>";
                    return;
                }
                data.forEach(item => {
                    const li = document.createElement('li');
                    li.innerHTML = `<span style="color:#666; font-size:12px;">[${item.date}]</span> <strong>${item.text}</strong>`;
                    listContainer.appendChild(li);
                });
            })
            .catch(err => {
                listContainer.innerHTML = "<li style='color:#c62828;'>Error loading messages!</li>";
                console.error(err);
            });
        }
    </script>
</body>
</html>
