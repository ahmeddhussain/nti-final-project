version: '3.8'

services:
  # 1. Database Service (MySQL)
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: testdb
    ports:
      - "3306:3306"

  # 2. Backend Service
  backend:
    build: ./backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: secret
      DB_NAME: testdb
    depends_on:
      - db

  # 3. Frontend Service
  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
