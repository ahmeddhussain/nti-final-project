kind: PrometheusRule
metadata:
  name: pod-resource-alerts
  labels:
    release: prometheus # Ties this rule directly to your Prometheus operator
spec:
  groups:
  - name: resource-usage-alerts
    rules:
    - alert: PodCPUUsageTooHigh
      expr: sum(rate(container_cpu_usage_seconds_total{container!=""}[5m])) by (pod) / sum(container_spec_cpu_quota{container!=""}/100000) by (pod) > 0.80
      for: 2m
      labels:
        severity: warning
      annotations:
        summary: "Pod CPU usage is above 80%!"
        description: "Pod {{ $labels.pod }} has been using more than 80% CPU for the last 2 minutes."

    - alert: PodMemoryUsageTooHigh
      expr: container_memory_working_set_bytes{container!=""} / container_spec_memory_limit_bytes{container!=""} > 0.80
      for: 2m
      labels:
        severity: warning
      annotations:
        summary: "Pod Memory usage is above 80%!"
        description: "Pod {{ $labels.pod }} has been using more than 80% Memory for the last 2 minutes."