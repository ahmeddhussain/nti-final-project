---
- name: Automate Host Machine Tool Setup & AWS Authentication
  hosts: jenkins
  become: true
  vars_files:
    - aws_secrets.yml
  tasks:
    - name: 1. Install unzip package (required for AWS CLI installer)
      ansible.builtin.apt:
        name: unzip
        state: present
        update_cache: true

    - name: 2. Create .aws directory on the host machine
      ansible.builtin.file:
        path: /home/ubuntu/.aws
        state: directory
        mode: '0700'
        owner: ubuntu
        group: ubuntu

    - name: 3. Inject AWS Credentials on the host machine (Automates aws configure)
      ansible.builtin.copy:
        dest: /home/ubuntu/.aws/credentials
        mode: '0600'
        owner: ubuntu
        group: ubuntu
        content: |
          [default]
          aws_access_key_id = {{ aws_access_key_id }}
          aws_secret_access_key = {{ aws_secret_access_key }}

    - name: 4. Inject AWS Config on the host machine
      ansible.builtin.copy:
        dest: /home/ubuntu/.aws/config
        mode: '0600'
        owner: ubuntu
        group: ubuntu
        content: |
          [default]
          region = {{ aws_default_region }}
          output = json

    - name: 5. Download AWS CLI v2 Installer on host machine
      ansible.builtin.get_url:
        url: https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip
        dest: /tmp/awscliv2.zip
        mode: '0644'

    - name: 6. Unzip AWS CLI Installer on host machine
      ansible.builtin.unarchive:
        src: /tmp/awscliv2.zip
        dest: /tmp
        remote_src: true

    - name: 7. Install AWS CLI v2 on host machine natively
      ansible.builtin.command: /tmp/aws/install --update
      args:
        creates: /usr/local/bin/aws

    - name: 8. Download Kubectl binary on host machine
      ansible.builtin.get_url:
        url: https://dl.k8s.io/release/v1.28.0/bin/linux/amd64/kubectl
        dest: /usr/local/bin/kubectl
        mode: '0755'

    - name: 9. Download Helm Installer on host machine
      ansible.builtin.get_url:
        url: https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
        dest: /tmp/get_helm.sh
        mode: '0755'

    - name: 10. Install Helm on host machine natively
      ansible.builtin.command: /tmp/get_helm.sh
      args:
        creates: /usr/local/bin/helm

    - name: 11. Clean up temporary installer files on host machine
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /tmp/awscliv2.zip
        - /tmp/aws
        - /tmp/get_helm.sh

    - name: 12. Delete any corrupt kubeconfig directory on the host machine
      ansible.builtin.file:
        path: /var/lib/docker/volumes/jenkins_home/_data/workspace/nti-final-project_main/kubeconfig
        state: absent