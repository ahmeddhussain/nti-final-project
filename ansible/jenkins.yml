---
- name: Install Docker and Launch Jenkins Container
  hosts: jenkins
  become: true
  tasks:
    - name: 1. Install system prerequisites
      ansible.builtin.apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - software-properties-common
        state: present
        update_cache: true

    - name: 2. Add Docker's official GPG key
      ansible.builtin.shell: |
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --yes --dearmor -o /usr/share/keyrings/docker-archive-keyring.gpg
        chmod 644 /usr/share/keyrings/docker-archive-keyring.gpg

    - name: 3. Add Docker repository to sources
      ansible.builtin.shell: |
        echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/docker-archive-keyring.gpg] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" > /etc/apt/sources.list.d/docker.list

    - name: 4. Install Docker CE
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
        state: present
        update_cache: true

    - name: 5. Start and enable Docker service
      ansible.builtin.systemd:
        name: docker
        state: started
        enabled: true

    - name: 6. Add ubuntu user to Docker group
      ansible.builtin.user:
        name: ubuntu
        groups: docker
        append: true

    - name: 7. Set permissive permissions on docker.sock
      ansible.builtin.file:
        path: /var/run/docker.sock
        mode: '0777'

    - name: 8. Pre-create tool directories on host
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: "{{ item.state }}"
        mode: '0755'
        owner: ubuntu
        group: ubuntu
      loop:
        - { path: '/home/ubuntu/.aws', state: 'directory' }
        - { path: '/home/ubuntu/.kube', state: 'directory' }

    - name: 9. Fail fast if host tools are missing (order-of-operations guard)
      ansible.builtin.stat:
        path: "{{ item }}"
      register: tool_check
      loop:
        - /usr/local/bin/kubectl
        - /usr/local/bin/helm
      failed_when: not tool_check.stat.exists or tool_check.stat.size < 1024

    - name: 10. Remove existing Jenkins container so updated mounts take effect
      ansible.builtin.shell: |
        docker rm -f jenkins >/dev/null 2>&1 || true
      changed_when: false

    # kubectl/helm are bind-mounted from the host (guaranteed real files by
    # task 9's guard above). AWS CLI is deliberately NOT bind-mounted — see
    # header note — it's installed natively inside the container in task 11.
    - name: 11. Launch Jenkins LTS Container with Host Tool Volume Mounts
      ansible.builtin.shell: |
        docker run -p 8080:8080 -p 50000:50000 -d \
          --name jenkins \
          --restart always \
          -v jenkins_home:/var/jenkins_home \
          -v /var/run/docker.sock:/var/run/docker.sock \
          -v /usr/bin/docker:/usr/bin/docker \
          -v /home/ubuntu/.aws:/var/jenkins_home/.aws \
          -v /home/ubuntu/.kube:/var/jenkins_home/.kube \
          -v /usr/local/bin/helm:/usr/local/bin/helm \
          -v /usr/local/bin/kubectl:/usr/local/bin/kubectl \
          jenkins/jenkins:lts

    - name: 12. Install AWS CLI natively inside the container (idempotent)
      ansible.builtin.shell: |
        docker exec jenkins sh -lc '
          rm -rf /var/jenkins_home/.aws-cli /var/jenkins_home/.local/bin/aws &&
          mkdir -p /tmp/aws-install /var/jenkins_home/.local/bin &&
          curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o /tmp/awscliv2.zip &&
          unzip -q /tmp/awscliv2.zip -d /tmp/aws-install &&
          /tmp/aws-install/aws/install -i /var/jenkins_home/.aws-cli -b /var/jenkins_home/.local/bin &&
          rm -rf /tmp/aws-install /tmp/awscliv2.zip
        '
      changed_when: true

    # -u root: /usr/local/bin is root-owned in this image, and the
    # container's default user (jenkins) can't write there.
    - name: 13. Symlink aws inside the container to a stable PATH location
      ansible.builtin.shell: |
        docker exec -u root jenkins ln -sf /var/jenkins_home/.local/bin/aws /usr/local/bin/aws
      changed_when: true

    - name: 14. Verify all tools work inside the container
      ansible.builtin.shell: |
        echo "--- aws ---"; docker exec jenkins /usr/local/bin/aws --version
        echo "--- kubectl ---"; docker exec jenkins /usr/local/bin/kubectl version --client
        echo "--- helm ---"; docker exec jenkins /usr/local/bin/helm version
      register: container_tool_check
      changed_when: false

    - name: 15. Show in-container tool verification result
      ansible.builtin.debug:
        msg: "{{ container_tool_check.stdout_lines }}"

    - name: 16. Retrieve Jenkins Initial Admin Password (with dynamic retries)
      ansible.builtin.command: docker exec jenkins cat /var/jenkins_home/secrets/initialAdminPassword
      register: jenkins_password
      until: jenkins_password.rc == 0
      retries: 12
      delay: 5
      ignore_errors: true

    - name: 17. SHOW JENKINS INITIAL ADMIN PASSWORD
      ansible.builtin.debug:
        msg: "SUCCESS! Your Jenkins Initial Admin Password is: {{ jenkins_password.stdout }}"
      when: jenkins_password.rc == 0